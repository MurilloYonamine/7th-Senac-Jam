name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build for ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - WebGL
          - StandaloneWindows64
    steps:
      # Checkout do código fonte
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # Restaura/Salva cache da pasta Library para acelerar o build
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-

      # Executa a compilação do Unity
      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}

      # Compacta o build resultante em um arquivo ZIP
      - name: Zip Build Output
        run: |
          cd build
          zip -r ../ComigoMiauPode-${{ matrix.targetPlatform }}.zip ${{ matrix.targetPlatform }}
          cd ..

      # Faz o upload do build temporariamente como artefato do GitHub Actions
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComigoMiauPode-${{ matrix.targetPlatform }}
          path: ComigoMiauPode-${{ matrix.targetPlatform }}.zip

  release:
    name: Create GitHub Release and Notify
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Baixa todos os artefatos compilados na etapa anterior
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Cria a Release no GitHub, gera as Notas de Versão automáticas e anexa os ZIPs
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Versão v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/ComigoMiauPode-WebGL.zip
            artifacts/ComigoMiauPode-StandaloneWindows64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Obtém a data e hora ajustadas para o timezone de São Paulo (UTC-3)
      - name: Get current date and time
        id: date
        run: |
          echo "date=$(TZ='America/Sao_Paulo' date +'%d/%m/%Y')" >> $GITHUB_OUTPUT
          echo "datetime=$(TZ='America/Sao_Paulo' date +'%d/%m/%Y %H:%M')" >> $GITHUB_OUTPUT

      # Envia a notificação unificada dos builds de WebGL e Windows no Discord
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -H "Content-Type: application/json" \
                 -d '{
                   "embeds": [
                     {
                       "title": "📢 Nova versão disponível (WebGL & StandaloneWindows64)",
                       "description": "**Projeto:** Comigo Miau Pode\n**Versão:** v1.0.${{ github.run_number }}\n**Plataformas:** WebGL & StandaloneWindows64\n**Link:** https://github.com/${{ github.repository }}/releases/tag/v1.0.${{ github.run_number }}\n**Issues:** https://github.com/MurilloYonamine/7th-Senac-Jam/issues/new\n**Data:** ${{ steps.date.outputs.date }}",
                       "color": 3066993,
                       "footer": {
                         "text": "${{ steps.date.outputs.datetime }}"
                       }
                     }
                   ]
                 }' \
                 "$DISCORD_WEBHOOK"
          else
            echo "Discord Webhook URL not set. Skipping notification."
          fi
